<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sibyl Sentry — Live Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="/config.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --bg: #0a0a0b; --bg-1: #121214; --bg-2: #1a1a1d;
    --line: #26262a; --line-strong: #3a3a40;
    --ink: #e8e8e0; --ink-dim: #8a8a82; --ink-faint: #55554e;
    --sibyl: #f4f028;
    --accent: #ff6a3d;
    --ok: #6eff8a; --running: #7ab8ff; --warn: #f5c451; --crit: #ff4d4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px; line-height: 1.5; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 5% 0%, rgba(244,240,40,0.04), transparent 50%),
      radial-gradient(ellipse at 95% 100%, rgba(255,106,61,0.06), transparent 50%),
      var(--bg);
  }
  #root { height: 100vh; }
  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
  header { border-bottom: 1px solid var(--line); display: grid;
    grid-template-columns: auto 1fr auto; align-items: center; padding: 0 22px; gap: 30px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-mark { font-family: 'Instrument Serif', serif; font-style: italic;
    color: var(--accent); font-size: 22px; letter-spacing: -0.5px; }
  .brand-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .tabs { display: flex; gap: 0; }
  .tab { padding: 8px 18px; font-family: inherit; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase; background: transparent;
    border: none; color: var(--ink-dim); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge { margin-left: 6px; padding: 1px 6px; background: var(--bg-1);
    border: 1px solid var(--line); color: var(--ink-faint); font-size: 9px; }
  .tab.active .badge { color: var(--accent); border-color: var(--accent); }
  .top-actions { display: flex; gap: 10px; align-items: center; }
  .btn { background: var(--bg-1); color: var(--ink);
    border: 1px solid var(--line-strong); padding: 7px 14px;
    font-family: inherit; font-size: 11px; letter-spacing: 0.05em;
    text-transform: uppercase; cursor: pointer; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #0a0a0b; border-color: var(--accent); font-weight: 700; }
  .btn-primary:hover { background: var(--ink); border-color: var(--ink); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .phase-pill { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink-faint); padding: 4px 10px; border: 1px solid var(--line);
    display: flex; align-items: center; gap: 6px; }
  .phase-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); }
  .phase-pill.live { color: var(--ok); border-color: var(--ok); }
  .phase-pill.live .dot { background: var(--ok); animation: phasePulse 1.6s ease-out infinite; }
  @keyframes phasePulse {
    0% { box-shadow: 0 0 0 0 rgba(110,255,138,0.7); }
    70% { box-shadow: 0 0 0 6px rgba(110,255,138,0); }
    100% { box-shadow: 0 0 0 0 rgba(110,255,138,0); }
  }

  main { overflow: hidden; position: relative; }
  .panel { position: absolute; inset: 0; visibility: hidden; pointer-events: none; opacity: 0; }
  .panel.active { visibility: visible; pointer-events: auto; opacity: 1; }

  .panel-list { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
  .scanners { border-right: 1px solid var(--line); padding: 16px 18px; overflow-y: auto; }
  .side-title { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 14px; }
  .scanner-card { border: 1px solid var(--line); margin-bottom: 12px;
    background: var(--bg-1); transition: border-color 0.3s ease, transform 0.15s ease; }
  .scanner-card.clickable { cursor: pointer; }
  .scanner-card.clickable:hover { border-color: var(--accent); transform: translateY(-1px); }
  .scanner-card.running { border-color: var(--sibyl); }
  .scanner-card.completed { border-color: var(--ok); }
  .scanner-card.failed { border-color: var(--crit); }
  .scanner-head { padding: 9px 12px; display: grid; grid-template-columns: 1fr auto;
    align-items: center; border-bottom: 1px solid var(--line); }
  .scanner-name { font-size: 12px; font-weight: 500; }
  .scanner-status { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-faint); }
  .scanner-card.running .scanner-status { color: var(--sibyl); }
  .scanner-card.completed .scanner-status { color: var(--ok); }
  .scanner-body { padding: 8px 12px 10px; font-size: 11px; color: var(--ink-dim); }
  .scanner-body .pair { display: flex; justify-content: space-between; }
  .scanner-body .pair b { color: var(--ink); }

  .stream { display: grid; grid-template-rows: auto 1fr 1fr; overflow: hidden; }
  .events { border-bottom: 1px solid var(--line); overflow: hidden; display: flex; flex-direction: column; }
  .findings { overflow: hidden; display: flex; flex-direction: column; }
  .section-head { padding: 10px 18px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline; background: var(--bg-1); }
  .section-title { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .section-count { font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 18px; color: var(--accent); }
  .scroll { overflow-y: auto; padding: 8px 18px 16px; flex: 1; }

  .ev { font-size: 11px; padding: 4px 0; display: grid;
    grid-template-columns: 70px 130px 1fr; gap: 10px; align-items: baseline;
    animation: eventEnter 0.35s ease-out; opacity: 0; animation-fill-mode: forwards; }
  @keyframes eventEnter {
    0% { opacity: 0; transform: translateX(8px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  .ev-ts { color: var(--ink-faint); font-size: 10px; }
  .ev-kind { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 6px; align-self: center; border: 1px solid var(--line-strong); text-align: center; }
  .ev-kind.node-started   { color: var(--sibyl);   border-color: var(--sibyl);   }
  .ev-kind.node-completed { color: var(--ok);      border-color: var(--ok);      }
  .ev-kind.node-failed    { color: var(--ink-dim); border-color: var(--ink-dim); }
  .ev-kind.workflow-started   { color: var(--running); border-color: var(--running); }
  .ev-kind.workflow-completed { color: var(--ok);      border-color: var(--ok);      }
  .ev-kind.workflow-failed    { color: var(--crit);    border-color: var(--crit);    }
  .ev-msg { color: var(--ink-dim); }
  .ev-msg b { color: var(--ink); font-weight: 500; }
  .ev-msg .mono { font-family: inherit; color: var(--sibyl); }

  .finding { border: 1px solid var(--line); border-left: 3px solid var(--accent);
    background: var(--bg-1); margin-bottom: 10px; padding: 12px 14px;
    animation: cardEnter 0.45s ease-out; opacity: 0; animation-fill-mode: forwards; }
  @keyframes cardEnter {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .finding.severity-CRITICAL { border-left-color: var(--crit); }
  .finding.severity-HIGH     { border-left-color: var(--accent); }
  .finding.severity-MEDIUM   { border-left-color: var(--warn); }
  .f-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 10px; }
  .f-title { font-size: 12px; color: var(--ink); font-weight: 500; flex: 1; }
  .f-head-right { display: flex; gap: 10px; align-items: center; }
  .f-sev { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
  .f-sev.CRITICAL { color: var(--crit); }
  .f-sev.HIGH     { color: var(--accent); }
  .f-sev.MEDIUM   { color: var(--warn); }
  .f-desc { font-size: 11px; color: var(--ink-dim); margin-bottom: 8px; line-height: 1.6; }
  .f-rationale { font-size: 11px; color: var(--ink-dim);
    padding: 10px 12px; margin-bottom: 8px;
    background: var(--bg); border-left: 2px solid var(--sibyl);
    line-height: 1.6; }
  .f-rationale.rejected { border-left-color: var(--ink-faint); color: var(--ink-faint); font-style: italic; }
  .rationale-label { color: var(--sibyl); font-weight: 700; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase; margin-right: 6px; }
  .finding.rejected { opacity: 0.65; border-left-color: var(--ink-faint); }
  .finding.rejected .f-title { text-decoration: line-through; text-decoration-color: var(--ink-faint); }
  .tmp-link { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--running); border: 1px solid var(--running);
    padding: 3px 8px; text-decoration: none; font-weight: 700; cursor: pointer; }
  .tmp-link:hover { background: var(--running); color: var(--bg); }
  .f-meta { font-size: 10px; color: var(--ink-faint); display: flex; gap: 14px; flex-wrap: wrap; }
  .f-meta b { color: var(--ink-dim); }
  .rejected-divider { margin: 16px 0 8px; padding-top: 12px;
    border-top: 1px solid var(--line); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }

  .wf-banner { margin: 12px 18px 0; padding: 12px 16px;
    background: var(--bg-1); border: 1px solid var(--line-strong);
    display: grid; grid-template-columns: auto 1fr auto; gap: 18px; align-items: center; }
  .wf-id { font-size: 11px; color: var(--ink); }
  .wf-id .label { color: var(--ink-faint); font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; margin-right: 8px; }
  .wf-id a { color: var(--running); text-decoration: none;
    border-bottom: 1px dotted var(--running); cursor: pointer; }
  .wf-id a:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .wf-status { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
  .wf-status.idle { color: var(--ink-faint); }
  .wf-status.running { color: var(--running); }
  .wf-status.completed { color: var(--ok); }
  .wf-status.failed { color: var(--crit); }
  .wf-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-faint); }
  .wf-pulse.running { background: var(--running); animation: phasePulse 1.6s ease-out infinite; }
  .wf-pulse.completed { background: var(--ok); }

  .panel-dag { display: grid; grid-template-rows: auto 1fr; height: 100%; }
  .dag-toolbar { padding: 12px 22px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center; background: var(--bg-1); }
  .dag-summary { display: flex; gap: 24px; font-size: 11px; color: var(--ink-dim); }
  .dag-summary .stat b { color: var(--ink); }
  .dag-summary .stat .v { color: var(--accent);
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 18px; margin-right: 4px; }
  .dag-summary .stat .v.crit { color: var(--crit); }
  .dag-legend { display: flex; gap: 14px; font-size: 10px; color: var(--ink-faint); }
  .dag-legend .swatch { display: inline-flex; align-items: center; gap: 5px; }
  .dag-legend .dot { width: 8px; height: 8px; border-radius: 1px; display: inline-block; }
  .dag-legend .dot.idle { background: var(--line-strong); }
  .dag-legend .dot.running { background: var(--sibyl); animation: legendPulse 1.2s ease-out infinite; }
  .dag-legend .dot.completed { background: var(--ok); }
  .dag-legend .dot.rejected { background: var(--ink-faint); }
  @keyframes legendPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .dag-canvas { position: relative; overflow: auto;
    background:
      linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px) 0 0 / 40px 40px; }
  /* Zoom wrapper sits inside the scroll container. Its dimensions
     drive the scrollable area; transform scales the SVG inside it
     without affecting the scrollbar logic. */
  .dag-zoom-wrap { transform-origin: 0 0; will-change: transform;
    /* width/height set inline via React from natural canvas dims × scale */ }
  .dag-canvas svg { display: block; }

  .dag-zoom-ctrl {
    display: flex; gap: 4px; align-items: center;
    margin-left: 18px; padding-left: 18px; border-left: 1px solid var(--line);
  }
  .dag-zoom-ctrl button {
    background: var(--bg); border: 1px solid var(--line-strong);
    color: var(--ink-dim); width: 26px; height: 26px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .dag-zoom-ctrl button:hover { color: var(--accent); border-color: var(--accent); }
  .dag-zoom-ctrl .zoom-pct {
    color: var(--ink-faint); font-size: 10px; min-width: 38px; text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* Notes icon on each converge node */
  .node-notes {
    fill: var(--ink-faint); cursor: pointer;
    transition: fill 0.2s ease;
  }
  .node-notes:hover { fill: var(--sibyl); }
  .node-notes-bg {
    fill: var(--bg); stroke: var(--line-strong); stroke-width: 1;
    cursor: pointer;
  }
  .node-notes-bg:hover { stroke: var(--sibyl); }

  /* Popover for notes — fixed-position overlay */
  .notes-popover {
    position: fixed; z-index: 100;
    background: var(--bg-1); border: 1px solid var(--accent);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,106,61,0.1);
    padding: 16px 18px; min-width: 380px; max-width: 520px;
    font-size: 11px; line-height: 1.55;
    animation: popoverIn 0.2s ease-out;
  }
  @keyframes popoverIn {
    from { opacity: 0; transform: scale(0.96) translateY(-4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .notes-popover .pop-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .notes-popover .pop-title {
    font-size: 11px; color: var(--ink); font-weight: 500;
    flex: 1; margin-right: 12px; word-break: break-word;
  }
  .notes-popover .pop-close {
    background: transparent; border: none; color: var(--ink-faint);
    font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .notes-popover .pop-close:hover { color: var(--ink); }
  .notes-popover .pop-field {
    margin-bottom: 8px;
  }
  .notes-popover .pop-label {
    color: var(--ink-faint); font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    display: block; margin-bottom: 3px;
  }
  .notes-popover .pop-value { color: var(--ink-dim); white-space: pre-wrap; word-break: break-word; }
  .notes-popover .pop-value.rationale {
    background: var(--bg); padding: 8px 10px;
    border-left: 2px solid var(--sibyl);
    color: var(--ink);
  }
  .notes-popover .pop-value.error {
    background: var(--bg); padding: 8px 10px;
    border-left: 2px solid var(--crit);
    color: var(--ink-dim);
  }
  .notes-popover .pop-value.sev-CRITICAL { color: var(--crit); font-weight: 700; }
  .notes-popover .pop-value.sev-HIGH     { color: var(--accent); font-weight: 700; }
  .notes-popover .pop-value.sev-MEDIUM   { color: var(--warn); font-weight: 700; }
  .notes-popover .pop-foot {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: flex-end;
  }
  .notes-popover .pop-tmp {
    color: var(--running); border: 1px solid var(--running);
    padding: 4px 10px; font-size: 9px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
  }
  .notes-popover .pop-tmp:hover { background: var(--running); color: var(--bg); }

  /* Synthesis summary card — replaces the bland "Synthesized Report" tile */
  .synth-card {
    fill: var(--bg-1); stroke: var(--ok); stroke-width: 1.5;
    cursor: pointer; transition: stroke 0.25s ease;
  }
  .synth-card:hover { filter: brightness(1.3); }
  .synth-empty { stroke: var(--line-strong); }
  .synth-label { fill: var(--ok); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; pointer-events: none; }
  .synth-num { fill: var(--accent); font-family: 'Instrument Serif', serif;
    font-style: italic; font-size: 24px; pointer-events: none; }
  .synth-sub { fill: var(--ink-faint); font-family: 'JetBrains Mono', monospace;
    font-size: 9px; pointer-events: none; }
  .synth-sev { font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em; pointer-events: none; }
  .synth-sev.CRITICAL { fill: var(--crit); }
  .synth-sev.HIGH { fill: var(--accent); }
  .synth-sev.MEDIUM { fill: var(--warn); }

  .node-g { cursor: pointer; transition: opacity 0.3s ease; }
  .node-g.idle    { opacity: 0.55; }
  .node-g.running { opacity: 1; }
  .node-g.completed, .node-g.accepted { opacity: 1; }
  .node-g.rejected, .node-g.failed { opacity: 0.7; }
  .node-g rect { transition: stroke 0.25s ease, fill 0.25s ease; stroke-width: 1.5; }
  .node-g:hover rect { filter: brightness(1.4); }
  .node-g.idle rect    { fill: var(--bg-1); stroke: var(--line-strong); }
  .node-g.running rect { fill: var(--bg-1); stroke: var(--sibyl); }
  .node-g.completed rect { fill: var(--bg-1); stroke: var(--ok); }
  .node-g.accepted rect  { fill: rgba(110,255,138,0.05); stroke: var(--ok); }
  .node-g.rejected rect, .node-g.failed rect {
    fill: rgba(85,85,78,0.05); stroke: var(--ink-faint);
  }
  .node-g.root rect { fill: var(--bg-1); stroke: var(--accent); }
  .node-g.root.running rect { stroke: var(--accent); }

  .node-pulse { fill: none; stroke: var(--sibyl); stroke-width: 2; opacity: 0; }
  .node-g.running .node-pulse { animation: nodePulseRing 1.4s ease-out infinite; }
  @keyframes nodePulseRing {
    0%   { stroke-opacity: 0.7; transform: scale(1); transform-box: fill-box; transform-origin: center; }
    100% { stroke-opacity: 0; transform: scale(1.18); transform-box: fill-box; transform-origin: center; }
  }

  .node-g .label { fill: var(--ink); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500; pointer-events: none; }
  .node-g.rejected .label, .node-g.failed .label {
    fill: var(--ink-faint); text-decoration: line-through;
  }
  .node-g.root .label { fill: var(--accent); }
  .node-g .sub { fill: var(--ink-faint); font-family: 'JetBrains Mono', monospace;
    font-size: 9px; pointer-events: none; }
  .node-g .badge { fill: var(--ink-faint); font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    pointer-events: none; transition: fill 0.25s ease; }
  .node-g.running .badge { fill: var(--sibyl); }
  .node-g.completed .badge, .node-g.accepted .badge { fill: var(--ok); }
  .node-g.rejected .badge, .node-g.failed .badge { fill: var(--ink-faint); }
  .node-g .sev { font-family: 'JetBrains Mono', monospace;
    font-size: 8px; font-weight: 700; letter-spacing: 0.1em; pointer-events: none; }
  .node-g .sev.CRITICAL { fill: var(--crit); }
  .node-g .sev.HIGH     { fill: var(--accent); }
  .node-g .sev.MEDIUM   { fill: var(--warn); }

  .edge-base    { stroke: var(--line); stroke-width: 1.5; fill: none; transition: stroke 0.3s ease; }
  .edge-active  { stroke: var(--sibyl); stroke-width: 2; fill: none; opacity: 0.85;
                  stroke-dasharray: 4 4; animation: flowdash 0.6s linear infinite; }
  .edge-done    { stroke: var(--ok); stroke-width: 1.5; fill: none; opacity: 0.5; }
  .edge-rejected { stroke: var(--ink-faint); stroke-width: 1; fill: none; opacity: 0.4;
                   stroke-dasharray: 3 3; }
  @keyframes flowdash { to { stroke-dashoffset: -8; } }

  .phase-label { fill: var(--ink-faint); font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    transition: fill 0.3s ease; }
  .phase-label.active { fill: var(--sibyl); }
  .phase-label.completed { fill: var(--ok); }
  .phase-line { stroke: var(--line); stroke-width: 1; stroke-dasharray: 4,4; }

  .empty-state { fill: var(--ink-faint); font-family: 'Instrument Serif', serif;
    font-style: italic; font-size: 14px; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const SCANNERS = [
  { id: 'secrets',  label: 'Secrets',        sub: 'regex + git history' },
  { id: 'oauth',    label: 'Stale OAuth',    sub: 'okta /apps' },
  { id: 'scopes',   label: 'Over-Privilege', sub: 'okta /apps/{id}' },
  { id: 'dormancy', label: 'Dormant SAs',    sub: 'aws /iam/users' },
];

// TEMPORAL_BASE is set by /config.js at page load. Fallback covers
// the case where /config.js failed to load (e.g. when opening
// index.html directly without sentry-web running).
const TEMPORAL_BASE = (window.SENTRY_CONFIG && window.SENTRY_CONFIG.temporal_ui_base)
  || 'http://localhost:8233/namespaces/default/workflows/';

function App() {
  const [tab, setTab] = useState('dag');
  const [playState, setPlayState] = useState('idle');
  const [workflowId, setWorkflowId] = useState(null);
  const [scanner, setScanner] = useState(() =>
    Object.fromEntries(SCANNERS.map(s => [s.id, 'idle'])));
  const [scannerOut, setScannerOut] = useState({});
  const [candidates, setCandidates] = useState({});
  const [events, setEvents] = useState([]);
  const [reportFindings, setReportFindings] = useState([]);
  const [reportRejected, setReportRejected] = useState([]);
  const esRef = useRef(null);

  function reset() {
    if (esRef.current) { esRef.current.close(); esRef.current = null; }
    setPlayState('idle');
    setWorkflowId(null);
    setScanner(Object.fromEntries(SCANNERS.map(s => [s.id, 'idle'])));
    setScannerOut({});
    setCandidates({});
    setEvents([]);
    setReportFindings([]);
    setReportRejected([]);
  }

  async function runAudit() {
    if (esRef.current) esRef.current.close();
    reset();
    setPlayState('running');

    let wfId = null;
    try {
      const resp = await fetch('/run', { method: 'POST',
        headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
      if (!resp.ok) {
        appendEvent({ kind: 'error', msg: 'run failed: ' + resp.statusText });
        setPlayState('idle');
        return;
      }
      const data = await resp.json();
      wfId = data.workflow_id;
      setWorkflowId(wfId);
    } catch (e) {
      appendEvent({ kind: 'error', msg: 'run failed: ' + e });
      setPlayState('idle');
      return;
    }

    const es = new EventSource('/events?workflow_id=' + encodeURIComponent(wfId));
    esRef.current = es;
    const onMsg = (m) => {
      try { handleEvent(JSON.parse(m.data)); }
      catch (e) { console.warn('parse', e); }
    };
    es.onmessage = onMsg;
    ['workflow.started','workflow.completed','workflow.failed',
     'node.started','node.completed','node.failed'].forEach(k => es.addEventListener(k, onMsg));
    es.onerror = () => { es.close(); esRef.current = null; };
  }

  function appendEvent(e) {
    setEvents(prev => [{ ...e, key: Date.now() + '-' + Math.random() }, ...prev].slice(0, 300));
  }

  function handleEvent(raw) {
    const ev = { kind: raw.kind, ...(raw.payload || {}) };
    const ts = new Date().toLocaleTimeString([], { hour12: false });

    switch (ev.kind) {
      case 'workflow.started':
        appendEvent({ kind: 'workflow-started', label: 'workflow.started',
          msg: `audit started: ${ev.workflow_id}`, ts });
        break;
      case 'workflow.completed':
        setPlayState('done');
        appendEvent({ kind: 'workflow-completed', label: 'workflow.completed',
          msg: `audit complete in ${(ev.duration_ms/1000).toFixed(1)}s`, ts });
        fetchReport(ev.workflow_id || workflowId);
        break;
      case 'workflow.failed':
        setPlayState('done');
        appendEvent({ kind: 'workflow-failed', label: 'workflow.failed',
          msg: `audit failed: ${ev.error || ''}`, ts });
        break;
      case 'node.started': {
        const nid = ev.node_id || '';
        if (nid.startsWith('converge:')) {
          const cid = nid.slice('converge:'.length);
          const wfId = ev.workflow_id || workflowId;
          setCandidates(prev => ({ ...prev, [cid]: {
            status: 'running', label: ev.label || cid, severity: null, rounds: 0,
            convergeWorkflowID: childWorkflowID(wfId, cid),
          }}));
          appendEvent({ kind: 'node-started', label: 'converge.start',
            msg: <><span className="mono">{cid}</span> running researcher/critic</>, ts });
        } else {
          setScanner(prev => ({ ...prev, [nid]: 'running' }));
          appendEvent({ kind: 'node-started', label: 'node.started',
            msg: <><b>{labelFor(nid)}</b> started</>, ts });
        }
        break;
      }
      case 'node.completed': {
        const nid = ev.node_id || '';
        if (nid.startsWith('converge:')) {
          const cid = nid.slice('converge:'.length);
          const out = ev.output || {};
          setCandidates(prev => ({ ...prev, [cid]: {
            status: 'accepted', label: ev.label || cid,
            severity: out.severity || null, rounds: out.rounds || 0,
            convergeWorkflowID: out.converge_workflow_id || '',
            rationale: out.rationale || '',
            description: out.description || '',
          }}));
          appendEvent({ kind: 'node-completed', label: 'converge.accept',
            msg: <><span className="mono">{cid}</span> accepted, severity <b>{out.severity}</b> · {out.rounds} round{(out.rounds||1)>1?'s':''}</>, ts });
        } else {
          setScanner(prev => ({ ...prev, [nid]: 'completed' }));
          setScannerOut(prev => ({ ...prev, [nid]: ev.output }));
          const summary = ev.output && typeof ev.output === 'object'
            ? Object.entries(ev.output).map(([k,v]) => `${k}=${v}`).join(' · ') : '';
          appendEvent({ kind: 'node-completed', label: 'node.completed',
            msg: <><b>{labelFor(nid)}</b> done ({(ev.duration_ms/1000).toFixed(2)}s) {summary}</>, ts });
        }
        break;
      }
      case 'node.failed': {
        const nid = ev.node_id || '';
        if (nid.startsWith('converge:')) {
          const cid = nid.slice('converge:'.length);
          const wfId = ev.workflow_id || workflowId;
          setCandidates(prev => ({ ...prev, [cid]: {
            status: 'rejected', label: ev.label || cid, severity: null, rounds: 0,
            reason: ev.error || '',
            convergeWorkflowID: (prev[cid] && prev[cid].convergeWorkflowID) || childWorkflowID(wfId, cid),
          }}));
          appendEvent({ kind: 'node-failed', label: 'converge.reject',
            msg: <><span className="mono">{cid}</span> rejected: {(ev.error||'').slice(0,60)}</>, ts });
        } else {
          setScanner(prev => ({ ...prev, [nid]: 'failed' }));
          appendEvent({ kind: 'node-failed', label: 'node.failed',
            msg: <><b>{labelFor(nid)}</b> failed: {ev.error || ''}</>, ts });
        }
        break;
      }
    }
  }

  async function fetchReport(wfId) {
    if (!wfId) return;
    try {
      const r = await fetch('/report?workflow_id=' + encodeURIComponent(wfId));
      if (!r.ok) return;
      const out = await r.json();
      setReportFindings(out.Report?.Findings || []);
      setReportRejected(out.Report?.Rejected || []);
    } catch (e) { console.warn('report fetch', e); }
  }

  useEffect(() => () => { if (esRef.current) esRef.current.close(); }, []);

  function inferParent(cid) {
    if (cid.startsWith('stale-oauth-') || cid.startsWith('oauth-')) return 'oauth';
    if (cid.startsWith('over-priv-') || cid.startsWith('overpriv-')) return 'scopes';
    if (cid.startsWith('dormant-iam-') || cid.startsWith('dorm-')) return 'dormancy';
    return 'secrets';
  }

  const candidatesByParent = useMemo(() => {
    const out = { secrets: [], oauth: [], scopes: [], dormancy: [] };
    Object.entries(candidates).forEach(([cid, c]) => {
      out[inferParent(cid)].push({ id: cid, ...c });
    });
    return out;
  }, [candidates]);

  const acceptedCount = useMemo(() =>
    Object.values(candidates).filter(c => c.status === 'accepted').length, [candidates]);
  const rejectedCount = useMemo(() =>
    Object.values(candidates).filter(c => c.status === 'rejected').length, [candidates]);
  const runningCount = useMemo(() =>
    Object.values(candidates).filter(c => c.status === 'running').length, [candidates]);

  const parentURL = workflowId ? TEMPORAL_BASE + workflowId : null;
  const openParent = () => parentURL && window.open(parentURL, '_blank');
  const openConverge = (childWfID) => childWfID && window.open(TEMPORAL_BASE + childWfID, '_blank');

  return (
    <div className="app">
      <header>
        <div className="brand">
          <span className="brand-mark">Sibyl Sentry</span>
          <span className="brand-sub">live audit</span>
        </div>
        <div className="tabs">
          <button className={"tab " + (tab === 'list' ? 'active' : '')} onClick={() => setTab('list')}>
            List <span className="badge">{events.length}</span>
          </button>
          <button className={"tab " + (tab === 'dag' ? 'active' : '')} onClick={() => setTab('dag')}>
            DAG <span className="badge">{Object.keys(candidates).length + 4}</span>
          </button>
        </div>
        <div className="top-actions">
          <div className={"phase-pill " + (playState === 'running' ? 'live' : '')}>
            <span className="dot"></span>
            {playState === 'running' ? 'live' : playState === 'done' ? 'done' : 'idle'}
          </div>
          <button className="btn" onClick={reset} disabled={playState === 'idle'}>Reset</button>
          <button className="btn btn-primary" onClick={runAudit} disabled={playState === 'running'}>
            {playState === 'done' ? 'Run Again' : 'Run Audit'}
          </button>
        </div>
      </header>

      <main>
        <div className={"panel panel-list " + (tab === 'list' ? 'active' : '')}>
          <ListView scanner={scanner} scannerOut={scannerOut}
            events={events} workflowId={workflowId} playState={playState}
            findings={reportFindings} rejected={reportRejected}
            openParent={openParent} openConverge={openConverge} />
        </div>
        <div className={"panel panel-dag " + (tab === 'dag' ? 'active' : '')}>
          <DagView scanner={scanner} scannerOut={scannerOut}
            candidates={candidates} candidatesByParent={candidatesByParent}
            workflowId={workflowId} playState={playState}
            acceptedCount={acceptedCount} rejectedCount={rejectedCount}
            runningCount={runningCount}
            openParent={openParent} openConverge={openConverge} />
        </div>
      </main>
    </div>
  );
}

function labelFor(scannerId) {
  const s = SCANNERS.find(s => s.id === scannerId);
  return s ? s.label : scannerId;
}

// Compose the deterministic child workflow ID from parent + candidate.
// Mirrors the Go side's childWorkflowID() — must stay in sync.
function childWorkflowID(parentWfID, candidateID) {
  if (!parentWfID || !candidateID) return '';
  const short = parentWfID.replace(/^sentry-audit-/, '');
  const safeCand = candidateID.length > 60 ? candidateID.slice(0, 60) : candidateID;
  return `converge-${short}-${safeCand}`;
}

function ListView({ scanner, scannerOut, events, workflowId, playState, findings, rejected, openParent, openConverge }) {
  const bannerStatus = playState === 'running' ? 'running' : playState === 'done' ? 'completed' : 'idle';
  const bannerLabel = playState === 'running' ? 'running...' : playState === 'done' ? 'completed' : 'idle';

  return (
    <>
      <aside className="scanners">
        <div className="side-title">Scanners <span style={{color:'var(--ink-faint)', fontStyle:'italic'}}>(click to open in Temporal)</span></div>
        {SCANNERS.map(s => {
          const status = scanner[s.id] || 'idle';
          const out = scannerOut[s.id];
          const clickable = !!workflowId;
          return (
            <div key={s.id}
                 className={"scanner-card " + status + (clickable ? " clickable" : "")}
                 onClick={clickable ? openParent : undefined}
                 title={clickable ? "Open audit workflow in Temporal" : undefined}>
              <div className="scanner-head">
                <span className="scanner-name">{s.label}</span>
                <span className="scanner-status">{status}</span>
              </div>
              <div className="scanner-body">
                {out ? Object.entries(out).map(([k,v]) => (
                  <div key={k} className="pair"><span>{k}</span><b>{String(v)}</b></div>
                )) : <div style={{color:'var(--ink-faint)', fontStyle:'italic'}}>{status === 'running' ? 'fetching from ' + s.sub + '...' : s.sub}</div>}
              </div>
            </div>
          );
        })}
        <div className="side-title" style={{marginTop: 28}}>Vendor Sources</div>
        <div className="scanner-card">
          <div className="scanner-head"><span className="scanner-name">Okta</span><span className="scanner-status">:9001</span></div>
          <div className="scanner-body">Admin API · users · groups · apps · logs</div>
        </div>
        <div className="scanner-card">
          <div className="scanner-head"><span className="scanner-name">AWS IAM</span><span className="scanner-status">:9002</span></div>
          <div className="scanner-body">Users · access keys · roles · policies</div>
        </div>
        <div className="scanner-card">
          <div className="scanner-head"><span className="scanner-name">GitHub</span><span className="scanner-status">:9003</span></div>
          <div className="scanner-body">Members · repos · teams · collaborators</div>
        </div>
      </aside>

      <section className="stream">
        <div className="wf-banner">
          <div className={"wf-pulse " + bannerStatus}></div>
          <div className="wf-id">
            <span className="label">workflow</span>
            {workflowId ? <a onClick={openParent}>{workflowId}</a> : <span>—</span>}
          </div>
          <div className={"wf-status " + bannerStatus}>{bannerLabel}</div>
        </div>

        <div className="events">
          <div className="section-head">
            <span className="section-title">Live Event Stream</span>
            <span className="section-count">{events.length}</span>
          </div>
          <div className="scroll">
            {events.length === 0
              ? <div style={{color:'var(--ink-faint)', fontStyle:'italic', textAlign:'center', padding:'20px'}}>Click "Run Audit" to start.</div>
              : events.map(e => (
                  <div key={e.key} className="ev">
                    <span className="ev-ts">{e.ts}</span>
                    <span className={"ev-kind " + (e.kind || '')}>{e.label || e.kind}</span>
                    <span className="ev-msg">{e.msg}</span>
                  </div>
                ))}
          </div>
        </div>

        <div className="findings">
          <div className="section-head">
            <span className="section-title">Findings (Researcher / Critic Converged)</span>
            <span className="section-count">{findings.length}</span>
          </div>
          <div className="scroll">
            {findings.length === 0 && rejected.length === 0
              ? <div style={{color:'var(--ink-faint)', fontStyle:'italic', textAlign:'center', padding:'20px'}}>No findings yet.</div>
              : <>
                  {findings.map(f => <FindingCard key={f.ID} f={f} rejected={false} openConverge={openConverge}/>)}
                  {rejected.length > 0 && (
                    <>
                      <div className="rejected-divider">Rejected by Critic ({rejected.length})</div>
                      {rejected.map((r, i) => <FindingCard key={i} f={r.Candidate || r} rejected={true} reason={r.Reason} convergeID={r.ConvergeWorkflowID} openConverge={openConverge}/>)}
                    </>
                  )}
                </>}
          </div>
        </div>
      </section>
    </>
  );
}

function FindingCard({ f, rejected, reason, convergeID, openConverge }) {
  const sev = f.Severity || 'INFO';
  const cwfid = rejected ? (convergeID || f.ConvergeWorkflowID || '') : (f.ConvergeWorkflowID || '');
  return (
    <div className={"finding " + (rejected ? 'rejected ' : '') + 'severity-' + sev}>
      <div className="f-head">
        <div className="f-title">{f.Title || '(no title)'}</div>
        <div className="f-head-right">
          {cwfid && <a className="tmp-link" onClick={() => openConverge(cwfid)}>TMP →</a>}
          <div className={"f-sev " + sev}>{rejected ? 'REJECTED' : sev}</div>
        </div>
      </div>
      <div className="f-desc">{f.Description || ''}</div>
      <div className={"f-rationale " + (rejected ? 'rejected' : '')}>
        <span className="rationale-label">{rejected ? 'Critic rejection:' : 'Critic rationale:'}</span>
        {rejected ? (reason || '') : (f.LLMRationale || '')}
      </div>
      <div className="f-meta">
        <span><b>scanner:</b> {f.ScannerID}</span>
        <span><b>category:</b> {f.Category}</span>
        {f.ConvergeRounds > 0 && <span><b>rounds:</b> {f.ConvergeRounds}</span>}
      </div>
    </div>
  );
}

function DagView({ scanner, scannerOut, candidates, candidatesByParent, workflowId, playState,
                   acceptedCount, rejectedCount, runningCount, openParent, openConverge }) {
  // Wider canvas so 5 candidates per scanner don't overlap. Each scanner
  // gets its own column (~270px wide), candidates wrap inside that column.
  const W = 1320;
  const SCANNER_W = 240, SCANNER_H = 60;
  const CAND_W = 116, CAND_H = 70, CAND_GAP_X = 8, CAND_GAP_Y = 10;
  const CANDS_PER_ROW = 2;   // 2 candidates wide → up to 3 rows for 5 candidates
  const SCANNER_Y = 130;
  const CAND_AREA_TOP = 230;

  // Each scanner column is SCANNER_W wide plus a gutter, evenly distributed.
  const COL_W = (W - 80) / 4;  // 4 scanner columns
  const scannerXs = {
    secrets:  40 + 0 * COL_W,
    oauth:    40 + 1 * COL_W,
    scopes:   40 + 2 * COL_W,
    dormancy: 40 + 3 * COL_W,
  };

  // Layout candidates inside each scanner's column.
  function candidateLayout(parent) {
    const colLeft = scannerXs[parent];
    const colCenter = colLeft + SCANNER_W / 2;
    // Center the candidate grid horizontally inside the column.
    const gridWidth = CANDS_PER_ROW * CAND_W + (CANDS_PER_ROW - 1) * CAND_GAP_X;
    const gridStartX = colCenter - gridWidth / 2;
    const cands = candidatesByParent[parent] || [];
    return cands.map((c, idx) => {
      const row = Math.floor(idx / CANDS_PER_ROW);
      const col = idx % CANDS_PER_ROW;
      return {
        ...c, parent,
        x: gridStartX + col * (CAND_W + CAND_GAP_X),
        y: CAND_AREA_TOP + row * (CAND_H + CAND_GAP_Y),
      };
    });
  }

  const candNodes = useMemo(() => {
    return ['secrets', 'oauth', 'scopes', 'dormancy'].flatMap(candidateLayout);
  }, [candidates]);

  const maxCandY = candNodes.reduce((m, n) => Math.max(m, n.y), CAND_AREA_TOP);
  const SYNTH_Y = maxCandY + CAND_H + 70;
  const totalH = SYNTH_Y + 130;

  // === Severity rollup for the synthesis tile ===
  const sevCounts = useMemo(() => {
    const out = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
    Object.values(candidates).forEach(c => {
      if (c.status === 'accepted' && c.severity && out[c.severity] !== undefined) {
        out[c.severity]++;
      }
    });
    return out;
  }, [candidates]);

  // === Zoom & pan ===
  const [zoom, setZoom] = useState(1);
  const MIN_ZOOM = 0.4, MAX_ZOOM = 2.5;
  const canvasRef = useRef(null);
  const setZoomClamped = (z) => setZoom(Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z)));

  // Cmd/Ctrl + scroll wheel zooms; we capture the wheel event when modifier
  // is held and translate to zoom-in/out. Plain wheel scrolls the canvas
  // normally (handled by the browser via overflow:auto).
  useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    const onWheel = (e) => {
      if (e.metaKey || e.ctrlKey) {
        e.preventDefault();
        const dir = e.deltaY < 0 ? 1 : -1;
        setZoomClamped(zoom + dir * 0.1);
      }
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [zoom]);

  const onDoubleClick = (e) => {
    if (e.target.closest('.node-g, .node-notes, .node-notes-bg, .notes-popover')) return;
    setZoom(1);
  };

  // === Notes popover state ===
  const [popover, setPopover] = useState(null); // { cand, x, y } or null
  const openNotes = (e, c) => {
    e.stopPropagation();
    // Anchor below the click point, with viewport-edge protection
    const rect = e.target.getBoundingClientRect ? e.target.getBoundingClientRect() : { left: 100, top: 100 };
    const x = Math.min(rect.left, window.innerWidth - 540);
    const y = Math.min(rect.bottom + 8, window.innerHeight - 320);
    setPopover({ cand: c, x: Math.max(20, x), y: Math.max(20, y) });
  };
  const closeNotes = () => setPopover(null);

  useEffect(() => {
    if (!popover) return;
    const onKey = (e) => { if (e.key === 'Escape') closeNotes(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [popover]);

  const phase1Status = useMemo(() => {
    const vals = Object.values(scanner);
    if (vals.every(v => v === 'idle')) return 'idle';
    if (vals.every(v => v === 'completed' || v === 'failed')) return 'completed';
    return 'active';
  }, [scanner]);
  const phase2Status = useMemo(() => {
    if (Object.keys(candidates).length === 0) return 'idle';
    if (runningCount > 0) return 'active';
    return 'completed';
  }, [candidates, runningCount]);
  const phase3Status = playState === 'done' ? 'completed' : 'idle';

  function edgeForScanner(sid) {
    const s = scanner[sid];
    if (s === 'running')   return 'edge-active';
    if (s === 'completed') return 'edge-done';
    if (s === 'failed')    return 'edge-rejected';
    return 'edge-base';
  }
  function edgeForCandidate(c) {
    if (c.status === 'running')  return 'edge-active';
    if (c.status === 'accepted') return 'edge-done';
    if (c.status === 'rejected' || c.status === 'failed') return 'edge-rejected';
    return 'edge-base';
  }

  return (
    <>
      <div className="dag-toolbar">
        <div className="dag-summary">
          <div className="stat"><span className="v">4</span><b>scanners</b></div>
          <div className="stat"><span className="v">{Object.keys(candidates).length}</span><b>candidates</b></div>
          <div className="stat"><span className="v">{acceptedCount}</span><b>accepted</b></div>
          <div className="stat"><span className={"v " + (rejectedCount>0 ? 'crit' : '')}>{rejectedCount}</span><b>rejected</b></div>
          {runningCount > 0 && <div className="stat"><span className="v" style={{color:'var(--sibyl)'}}>{runningCount}</span><b>running</b></div>}
        </div>
        <div style={{display:'flex', alignItems:'center'}}>
          <div className="dag-legend">
            <span className="swatch"><span className="dot idle"></span> idle</span>
            <span className="swatch"><span className="dot running"></span> running</span>
            <span className="swatch"><span className="dot completed"></span> done</span>
            <span className="swatch"><span className="dot rejected"></span> rejected</span>
          </div>
          <div className="dag-zoom-ctrl" title="Cmd/Ctrl + scroll to zoom · double-click to reset">
            <button onClick={() => setZoomClamped(zoom - 0.15)} title="Zoom out">−</button>
            <span className="zoom-pct">{Math.round(zoom * 100)}%</span>
            <button onClick={() => setZoomClamped(zoom + 0.15)} title="Zoom in">+</button>
            <button onClick={() => setZoom(1)} title="Reset zoom" style={{fontSize: '10px'}}>↺</button>
          </div>
        </div>
      </div>

      <div ref={canvasRef} className="dag-canvas" onDoubleClick={onDoubleClick}>
        <div className="dag-zoom-wrap" style={{
          width: W * zoom, height: totalH * zoom,
          transform: `scale(${zoom})`,
        }}>
        <svg width={W} height={totalH} viewBox={`0 0 ${W} ${totalH}`} xmlns="http://www.w3.org/2000/svg">
          <text x={40} y={32} className={"phase-label " + phase1Status}>Phase 1 — Scanner Fan-Out</text>
          <line x1={20} y1={SCANNER_Y + SCANNER_H + 20} x2={W-20} y2={SCANNER_Y + SCANNER_H + 20} className="phase-line"/>
          <text x={40} y={SCANNER_Y + SCANNER_H + 40} className={"phase-label " + phase2Status}>Phase 2 — Convergence (Researcher / Critic per candidate)</text>
          <line x1={20} y1={SYNTH_Y - 25} x2={W-20} y2={SYNTH_Y - 25} className="phase-line"/>
          <text x={40} y={SYNTH_Y - 8} className={"phase-label " + phase3Status}>Phase 3 — Synthesis</text>

          <Node x={(W - 320) / 2} y={20} w={320} h={70}
                cls={"root " + (playState === 'running' ? 'running' : playState === 'done' ? 'completed' : 'idle')}
                onClick={openParent}>
            <text x={160} y={26} textAnchor="middle" className="label">SecurityAuditWorkflow</text>
            <text x={160} y={44} textAnchor="middle" className="sub">{workflowId || '—'}</text>
            <text x={160} y={60} textAnchor="middle" className="badge">CLICK → TEMPORAL</text>
          </Node>

          {SCANNERS.map(s => {
            const sx = scannerXs[s.id] + SCANNER_W / 2;
            return (
              <path key={"e-root-"+s.id}
                d={`M ${W/2} 90 L ${W/2} 110 L ${sx} 110 L ${sx} ${SCANNER_Y}`}
                className={edgeForScanner(s.id)} />
            );
          })}

          {SCANNERS.map(s => {
            const status = scanner[s.id] || 'idle';
            const out = scannerOut[s.id] || {};
            const subText = status === 'completed' && out.findings_count !== undefined
              ? `${out.findings_count} candidate${out.findings_count !== 1 ? 's' : ''} found`
              : status === 'running' ? 'fetching...' : s.sub;
            return (
              <Node key={s.id} x={scannerXs[s.id]} y={SCANNER_Y} w={SCANNER_W} h={SCANNER_H}
                    cls={"scanner " + status} onClick={openParent}>
                <text x={SCANNER_W/2} y={20} textAnchor="middle" className="label">{s.label}</text>
                <text x={SCANNER_W/2} y={36} textAnchor="middle" className="sub">{s.sub}</text>
                <text x={SCANNER_W/2} y={52} textAnchor="middle" className="badge">{subText}</text>
              </Node>
            );
          })}

          {candNodes.map(c => {
            const fromX = scannerXs[c.parent] + SCANNER_W / 2;
            const fromY = SCANNER_Y + SCANNER_H;
            const toX = c.x + CAND_W / 2;
            const toY = c.y;
            const midY = (fromY + toY) / 2;
            return (
              <path key={"e-c-"+c.id}
                d={`M ${fromX} ${fromY} C ${fromX} ${midY}, ${toX} ${midY}, ${toX} ${toY}`}
                className={edgeForCandidate(c)} />
            );
          })}

          {candNodes.map(c => (
            <ConvergeNode key={c.id} c={c} w={CAND_W} h={CAND_H}
              onOpenTemporal={() => openConverge(c.convergeWorkflowID)}
              onOpenNotes={(e) => openNotes(e, c)} />
          ))}

          {candNodes.length === 0 && (
            <text x={W/2} y={CAND_AREA_TOP + 80} textAnchor="middle" className="empty-state">
              {playState === 'idle' ? 'Click "Run Audit" to begin.' : 'Waiting for scanner candidates...'}
            </text>
          )}

          {candNodes.map(c => {
            if (c.status === 'idle' || c.status === 'running') return null;
            const fromX = c.x + CAND_W / 2;
            const fromY = c.y + CAND_H;
            const toX = c.status === 'accepted' ? (W/2 - 130) : (W/2 + 130);
            return (
              <path key={"e-synth-"+c.id}
                d={`M ${fromX} ${fromY} L ${fromX} ${SYNTH_Y - 30} L ${toX} ${SYNTH_Y - 30} L ${toX} ${SYNTH_Y}`}
                className={edgeForCandidate(c)} />
            );
          })}

          {/* === Synthesis: Accepted report — structured summary === */}
          <SynthesisTile x={W/2 - 260} y={SYNTH_Y} w={260} h={110}
                         accepted={acceptedCount} sevCounts={sevCounts}
                         onClick={openParent} />

          {/* === Synthesis: Rejected log === */}
          <g transform={`translate(${W/2 + 10}, ${SYNTH_Y})`}
             className="node-g" onClick={openParent} style={{cursor:'pointer'}}>
            <rect width={260} height={110} rx={2}
              fill="var(--bg-1)" stroke="var(--ink-faint)" strokeWidth={1} strokeDasharray="2,2"
              style={{opacity: rejectedCount > 0 ? 1 : 0.4}}/>
            <text x={130} y={26} textAnchor="middle" className="synth-label" style={{fill:'var(--ink-faint)'}}>Rejected by Critic</text>
            <text x={130} y={60} textAnchor="middle" className="synth-num" style={{fill:'var(--ink-faint)'}}>{rejectedCount}</text>
            <text x={130} y={82} textAnchor="middle" className="synth-sub">rejected with rationale</text>
            <text x={130} y={98} textAnchor="middle" className="synth-sub" style={{fontStyle:'italic'}}>audit trail kept</text>
          </g>
        </svg>
        </div>

        {popover && <NotesPopover popover={popover} onClose={closeNotes} onOpenTemporal={openConverge} />}
      </div>
    </>
  );
}

// SynthesisTile renders the accepted findings summary with severity breakdown.
// Replaces the previous bare "X accepted" tile with something the user can
// actually read.
function SynthesisTile({ x, y, w, h, accepted, sevCounts, onClick }) {
  const empty = accepted === 0;
  return (
    <g className="node-g" transform={`translate(${x}, ${y})`} onClick={onClick} style={{cursor:'pointer'}}>
      <rect width={w} height={h} rx={2} className={"synth-card " + (empty ? 'synth-empty' : '')}/>
      <text x={w/2} y={22} textAnchor="middle" className="synth-label">Accepted Findings</text>
      <text x={w/2} y={56} textAnchor="middle" className="synth-num">{accepted}</text>
      {!empty && (
        <g transform={`translate(${w/2}, 78)`}>
          {Object.entries(sevCounts).filter(([_, n]) => n > 0).map(([sev, n], i, arr) => {
            const gap = 70;
            const totalW = arr.length * gap;
            const xOff = -totalW/2 + i * gap + gap/2;
            return (
              <g key={sev} transform={`translate(${xOff}, 0)`}>
                <text x={0} y={0} textAnchor="middle" className={"synth-sev " + sev}>{sev}</text>
                <text x={0} y={16} textAnchor="middle" className="synth-sub">{n}</text>
              </g>
            );
          })}
        </g>
      )}
      {empty && <text x={w/2} y={88} textAnchor="middle" className="synth-sub" style={{fontStyle:'italic'}}>no findings yet</text>}
    </g>
  );
}

// ConvergeNode is a candidate tile with a notes-icon affordance.
// Click body → Temporal; click ℹ icon → notes popover with rationale/error.
function ConvergeNode({ c, w, h, onOpenTemporal, onOpenNotes }) {
  const status = c.status;
  const hasNotes = !!(c.rationale || c.reason || status === 'accepted' || status === 'rejected');
  return (
    <g className={"node-g converge " + status} transform={`translate(${c.x}, ${c.y})`}>
      <rect width={w} height={h} rx={2} onClick={onOpenTemporal} style={{cursor:'pointer'}}/>
      <rect className="node-pulse" x={-2} y={-2} width={w+4} height={h+4} rx={4}/>
      <text x={w/2} y={18} textAnchor="middle" className="label" style={{fontSize:'10px', pointerEvents:'none'}}>
        {c.id.length > 18 ? c.id.slice(0,16)+'..' : c.id}
      </text>
      {c.severity && (
        <text x={w/2} y={36} textAnchor="middle" className={"sev " + c.severity}
              style={{pointerEvents:'none'}}>{c.severity}</text>
      )}
      <text x={w/2} y={54} textAnchor="middle" className="badge" style={{fontSize:'8px', pointerEvents:'none'}}>
        {status === 'accepted' ? `ACCEPTED · ${c.rounds}R`
          : status === 'rejected' ? `REJECTED · ${c.rounds||1}R`
          : status === 'running' ? 'RUNNING' : 'PENDING'}
      </text>
      {hasNotes && (
        <>
          <circle cx={w - 11} cy={11} r={8} className="node-notes-bg" onClick={onOpenNotes}/>
          <text x={w - 11} y={14.5} textAnchor="middle" className="node-notes"
                style={{fontSize:'10px', fontWeight:'700', pointerEvents:'none', userSelect:'none'}}>i</text>
          {/* Larger transparent hit target above the visible icon for easier click */}
          <rect x={w - 22} y={0} width={22} height={22}
                fill="transparent" style={{cursor:'pointer'}} onClick={onOpenNotes}/>
        </>
      )}
    </g>
  );
}

// NotesPopover surfaces the structured fields of a converge result so the
// user doesn't have to read Temporal's raw JSON dumps.
function NotesPopover({ popover, onClose, onOpenTemporal }) {
  const c = popover.cand;
  return (
    <>
      <div style={{position:'fixed', inset:0, zIndex:99}} onClick={onClose}/>
      <div className="notes-popover" style={{left: popover.x, top: popover.y}}>
        <div className="pop-head">
          <span className="pop-title">{c.label || c.id}</span>
          <button className="pop-close" onClick={onClose}>×</button>
        </div>

        <div className="pop-field">
          <span className="pop-label">candidate id</span>
          <span className="pop-value">{c.id}</span>
        </div>

        <div className="pop-field">
          <span className="pop-label">status</span>
          <span className={"pop-value " + (c.severity ? "sev-"+c.severity : "")}>
            {c.status === 'accepted' && c.severity ? `${c.severity} · accepted` :
             c.status === 'rejected' ? 'rejected by Critic' :
             c.status === 'running' ? 'researcher/critic in progress' : c.status}
            {c.rounds > 0 && ` · ${c.rounds} round${c.rounds > 1 ? 's' : ''}`}
          </span>
        </div>

        {c.description && (
          <div className="pop-field">
            <span className="pop-label">description</span>
            <span className="pop-value">{c.description}</span>
          </div>
        )}

        {c.rationale && c.status === 'accepted' && (
          <div className="pop-field">
            <span className="pop-label">critic rationale</span>
            <span className="pop-value rationale">{c.rationale}</span>
          </div>
        )}

        {c.reason && c.status === 'rejected' && (
          <div className="pop-field">
            <span className="pop-label">rejection reason</span>
            <span className="pop-value error">{c.reason}</span>
          </div>
        )}

        <div className="pop-foot">
          {c.convergeWorkflowID && (
            <a className="pop-tmp" onClick={() => onOpenTemporal(c.convergeWorkflowID)}>
              Open in Temporal →
            </a>
          )}
        </div>
      </div>
    </>
  );
}

function Node({ x, y, w, h, cls, onClick, children }) {
  return (
    <g className={"node-g " + cls} transform={`translate(${x}, ${y})`} onClick={onClick}>
      <rect width={w} height={h} rx={2}/>
      <rect className="node-pulse" x={-2} y={-2} width={w+4} height={h+4} rx={4}/>
      {children}
    </g>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
